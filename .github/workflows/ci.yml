name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, edited, synchronize, reopened]

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  UV_PYTHON_PREFERENCE: only-managed

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Install poetry
        run: uv tool install poetry
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
          cache: "poetry"
      - name: Install Dependencies
        run: |
          poetry install --all-extras
      - name: Run pre-commit (prek)
        uses: j178/prek-action@bdca6f102f98e2b4c7029491a53dfd366469e33d # v2.0.4

  # Make sure the PR title follows the conventional commits convention:
  # https://www.conventionalcommits.org
  # PRs are squash-merged, so the PR title becomes the commit on main and
  # drives python-semantic-release's version bump.
  pr-title:
    name: Lint PR Title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            didn't match the configured pattern. Please ensure that the subject
            starts with a lowercase character.

  test:
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
        os:
          - ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Install poetry
        run: uv tool install poetry
      - name: Set up Python
        uses: actions/setup-python@v6
        id: setup-python
        with:
          python-version: ${{ matrix.python-version }}
          cache: "poetry"
          allow-prereleases: true
      - run: echo "Cache hit:${{ steps.setup-python.outputs.cache-hit }}" # true if cache-hit occurred on the primary key
      - name: Install Dependencies
        run: poetry install --all-extras
      - name: Test with Pytest
        run: ./.bin/test-code
        shell: bash
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  benchmarks:
    name: Run CodSpeed benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Install poetry
        run: uv tool install poetry
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "poetry"
      - name: Install Dependencies
        run: poetry install --only=main,dev
      - name: Run CodSpeed benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          run: poetry run pytest tests/benchmarks --no-cov -o addopts="" --codspeed
          mode: simulation

  # Dry run on PRs and non-main pushes. No environment, no publish
  # permissions, no OIDC, so PR runs carry no release blast radius.
  release-dry-run:
    needs:
      - test
      - lint
    if: github.ref_name != 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}
      - name: Create local branch name
        env:
          BRANCH: ${{ github.head_ref || github.ref_name }}
        run: git switch -C "$BRANCH"
      - name: Test release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          no_operation_mode: true

  # Real release, only on main. The release environment and write/OIDC
  # permissions are scoped to this job so they never apply to PR runs.
  release:
    needs:
      - test
      - lint
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    environment: release
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}
          # On fork PRs the head branch lives on the contributor's
          # repository, not the base repo, so explicitly target the head
          # repo (falls back to the base repo on push events).
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          # Fall back to GITHUB_TOKEN on dependabot / fork PRs, where
          # secrets.BOT_ACCESS_TOKEN is not exposed and would otherwise
          # leave actions/checkout's `token` input empty.
          token: ${{ secrets.BOT_ACCESS_TOKEN || github.token }}

      - name: Create local branch
        env:
          BRANCH: ${{ github.ref_name }}
        run: git switch -C "$BRANCH"

      - name: Setup Git
        run: |
          git config user.name "uiprotectbot"
          git config user.email "uiprotect@koston.org"

      # On main branch: actual PSR + upload to PyPI & GitHub
      - name: Release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        id: release
        with:
          github_token: ${{ secrets.BOT_ACCESS_TOKEN }}

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        if: steps.release.outputs.released == 'true'

      - name: Publish package distributions to GitHub Releases
        uses: python-semantic-release/publish-action@v10.5.3
        if: steps.release.outputs.released == 'true'
        with:
          github_token: ${{ secrets.BOT_ACCESS_TOKEN }}
