name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  UV_PYTHON_PREFERENCE: only-managed

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Install poetry
        run: uv tool install poetry
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
          cache: "poetry"
      - name: Install Dependencies
        run: |
          poetry install
      - uses: pre-commit/action@v3.0.1

  # Make sure the PR title follows the conventional commits convention:
  # https://www.conventionalcommits.org
  # PRs are squash-merged, so the PR title becomes the commit on main and
  # drives python-semantic-release's version bump.
  pr-title:
    name: Lint PR Title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            didn't match the configured pattern. Please ensure that the subject
            starts with a lowercase character.

  test:
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
        os:
          - ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Install poetry
        run: uv tool install poetry
      - name: Set up Python
        uses: actions/setup-python@v6
        id: setup-python
        with:
          python-version: ${{ matrix.python-version }}
          cache: "poetry"
          allow-prereleases: true
      - run: echo "Cache hit:${{ steps.setup-python.outputs.cache-hit }}" # true if cache-hit occurred on the primary key
      - name: Install Dependencies
        run: poetry install
      - name: Test with Pytest
        run: ./.bin/test-code
        shell: bash
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  benchmarks:
    name: Run CodSpeed benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Install poetry
        run: uv tool install poetry
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "poetry"
      - name: Install Dependencies
        run: poetry install --only=main,dev
      - name: Run CodSpeed benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          run: poetry run pytest tests/benchmarks --no-cov -o addopts="" --codspeed
          mode: simulation

  release:
    needs:
      - test
      - lint

    runs-on: ubuntu-latest
    # Only enter the protected 'release' environment when actually releasing
    # from main; PR dry-runs would otherwise be blocked by the env's
    # main-only branch policy.
    environment: ${{ github.ref_name == 'main' && 'release' || '' }}
    concurrency:
      group: release-${{ github.head_ref || github.ref }}
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Use the merge commit ref so fork-PR branches (which only exist in
          # the contributor's fork) don't cause a 404.  PSR needs a branch
          # name, so we recreate one locally in the next step.
          ref: ${{ github.ref }}
          # Fall back to GITHUB_TOKEN on dependabot PRs, where
          # secrets.BOT_ACCESS_TOKEN is not exposed and would otherwise
          # leave actions/checkout's `token` input empty.
          token: ${{ secrets.BOT_ACCESS_TOKEN || github.token }}

      - name: Create local branch
        env:
          BRANCH: ${{ github.head_ref || github.ref_name }}
        run: git switch -C "$BRANCH"

      - name: Setup Git
        run: |
          git config user.name "uiprotectbot"
          git config user.email "uiprotect@koston.org"

      # Do a dry run of PSR
      - name: Test release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        if: github.ref_name != 'main'
        with:
          no_operation_mode: true

      # On main branch: actual PSR + upload to PyPI & GitHub
      - name: Release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        id: release
        if: github.ref_name == 'main'
        with:
          github_token: ${{ secrets.BOT_ACCESS_TOKEN }}

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        if: steps.release.outputs.released == 'true'

      - name: Publish package distributions to GitHub Releases
        uses: python-semantic-release/upload-to-gh-release@main
        if: steps.release.outputs.released == 'true'
        with:
          github_token: ${{ secrets.BOT_ACCESS_TOKEN }}
